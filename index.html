<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Advisory Board</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="poster">

    <div class="top-design left"></div>
    <div class="top-design right"></div>

    <header>
  <img src="ADSSU-LOGO.png" alt="Logo ni ADSSU" width="200">
</header>

    <h2 class="school-name">AGUSAN DEL SUR STATE UNIVERSITY</h2>

    <div class="advisory-box">
        ADVISORY
    </div>

    <p class="subtext">
        Official Announcement Board for Students, Faculty and Staff
    </p>

    <div class="announcement-area">

        <input type="text" id="announcementInput" placeholder="Type official announcement here...">

        <button onclick="postAnnouncement()">Post Announcement</button>

        <div id="outputBox">
            Your official announcement will appear here.
        </div>

    </div>

    <div class="footer">
        Stay Informed • Stay Updated • Stay Safe
    </div>

</div>

<script src="apps.js"></script>
</body>
</html>
